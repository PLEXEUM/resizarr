{% extends "base.html" %}

{% block content %}

<div class="max-w-lg mx-auto">
    <div class="card rounded-xl p-8">
        <h1 class="text-2xl font-bold mb-2">Welcome to Resizarr</h1>
        <p class="text-sm mb-8" style="color: var(--text-secondary)">
            Connect your Radarr instance to get started.
        </p>

        <!-- Connection Form -->
        <div class="space-y-5">
            <div>
                <label class="block text-sm font-medium mb-2">Radarr URL</label>
                <input
                    id="radarr-url"
                    type="url"
                    placeholder="http://localhost:7878"
                    class="w-full px-4 py-2 rounded-lg text-sm border"
                    style="background: var(--bg-primary); border-color: var(--border-color); color: var(--text-primary);"
                />
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Radarr API Key</label>
                <input
                    id="radarr-api-key"
                    type="password"
                    placeholder="Your Radarr API key"
                    class="w-full px-4 py-2 rounded-lg text-sm border"
                    style="background: var(--bg-primary); border-color: var(--border-color); color: var(--text-primary);"
                />
            </div>

            <!-- Test Connection Button -->
            <button
                onclick="testConnection()"
                class="w-full py-2 rounded-lg text-sm font-medium border"
                style="border-color: var(--accent); color: var(--accent);"
            >
                <span id="test-label">Test Connection</span>
                <span id="test-spinner" class="spinner hidden ml-2"></span>
            </button>

            <!-- Connection Status -->
            <div id="connection-status" class="hidden text-sm px-4 py-3 rounded-lg"></div>

            <!-- Save Button (shown after successful test) -->
            <button
                id="save-btn"
                onclick="saveConfig()"
                class="hidden w-full py-2 rounded-lg text-sm font-medium text-white"
                style="background: var(--accent);"
            >
                Save & Continue
            </button>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
async function testConnection() {
    const url = document.getElementById('radarr-url').value.trim();
    const apiKey = document.getElementById('radarr-api-key').value.trim();
    
    if (!url || !apiKey) {
        showToast('Please enter both URL and API key', 'warning');
        return;
    }
    
    document.getElementById('test-label').textContent = 'Testing...';
    document.getElementById('test-spinner').classList.remove('hidden');
    
    try {
        const res = await fetch('/api/config/test', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ radarr_url: url, radarr_api_key: apiKey })
        });
        
        const data = await res.json();
        const status = document.getElementById('connection-status');
        status.classList.remove('hidden');
        
        if (res.ok) {
            status.className = 'text-sm px-4 py-3 rounded-lg bg-green-900 text-green-200';
            status.textContent = '✓ ' + data.message;
            document.getElementById('save-btn').classList.remove('hidden');
        } else {
            status.className = 'text-sm px-4 py-3 rounded-lg bg-red-900 text-red-200';
            status.textContent = '✗ ' + (data.detail || 'Connection failed');
        }
    } catch (e) {
        showToast('Request failed: ' + e.message, 'error');
    } finally {
        document.getElementById('test-label').textContent = 'Test Connection';
        document.getElementById('test-spinner').classList.add('hidden');
    }
}

async function saveConfig() {
    const url = document.getElementById('radarr-url').value.trim();
    const apiKey = document.getElementById('radarr-api-key').value.trim();
    
    try {
        const res = await fetch('/api/config', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                radarr_url: url,
                radarr_api_key: apiKey,
                quality_profile_id: null,
                quality_profile_name: null
            })
        });
        
        if (res.ok) {
            showToast('Configuration saved!', 'success');
            setTimeout(() => window.location.href = '/rules', 1000);
        } else {
            const data = await res.json();
            showToast(data.detail || 'Failed to save', 'error');
        }
    } catch (e) {
        showToast('Request failed: ' + e.message, 'error');
    }
}

// Make functions available globally
window.testConnection = testConnection;
window.saveConfig = saveConfig;
</script>
{% endblock %}
