{% extends "base.html" %}

{% block content %}
<div class="space-y-6">

    <div class="card rounded-xl overflow-hidden">
        <div class="card-header">
            <svg class="card-header-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
            </svg>
            <div>
                <h2 class="card-header-title">Completed Jobs</h2>
                <p class="card-header-subtitle">History of movies that were replaced, queued, or rejected</p>
            </div>
            <div class="ml-auto flex gap-2">
                <button onclick="updateMissingDetails()"
                    class="btn-sm btn-outline">
                    Update Missing Details
                </button>
                <button onclick="clearCompletedJobs()"
                    class="btn-sm btn-danger">
                    Clear History
                </button>
            </div>
        </div>

        <!-- Completed Jobs Table -->
        <div class="overflow-x-auto">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Movie</th>
                        <th>From → To</th>
                        <th>Indexer</th>
                        <th>Peers</th>
                        <th>TMDB</th>
                        <th>Mode</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="completed-table">
                    <tr>
                        <td colspan="8" class="text-center py-8" style="color: var(--text-secondary)">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div id="pagination" class="px-4 py-3 border-t flex items-center justify-between text-sm" style="border-color: var(--border-color);"></div>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script>
    let currentPage = 1;

    window.addEventListener('DOMContentLoaded', () => {
        loadCompleted(1);
    });

    async function loadCompleted(page) {
        currentPage = page;
        try {
            const res = await fetch(`/api/completed?page=${page}&per_page=20`);
            const data = await res.json();
            const tbody = document.getElementById('completed-table');

            if (!data.records || data.records.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" class="text-center py-8" style="color: var(--text-secondary)">
                            No completed jobs yet.
                        </td>
                    </tr>`;
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            tbody.innerHTML = data.records.map(r => `
                <tr>
                    <td class="whitespace-nowrap">${new Date(r.completed_at).toLocaleDateString()}</td>
                    <td>
                        <div class="font-medium">${escapeHtml(r.movie_title)}</div>
                        <div class="text-xs" style="color: var(--text-secondary)">${r.movie_year || 'Year N/A'}</div>
                    </td>
                    <td>
                        <div class="size-from">${r.current_size_gb?.toFixed(2) || 'N/A'} GB (${r.current_quality || 'N/A'})</div>
                        <div class="size-to">→ ${r.found_size_gb?.toFixed(2) || 'N/A'} GB (${r.found_quality || 'N/A'})</div>
                        <div class="text-xs" style="color: var(--text-secondary)">
                            ${((r.current_size_gb - r.found_size_gb) || 0).toFixed(2)} GB saved
                        </div>
                    </td>
                    <td>
                        <div class="text-xs">${r.indexer || 'N/A'}</div>
                    </td>
                    <td>
                        <div class="flex items-center gap-1">
                            <span class="peer-count">▼</span>
                            <span>${r.seeders || 0}</span>
                        </div>
                    </td>
                    <td>
                        ${r.tmdb_rating ? `<div class="flex items-center gap-1"><span class="star">★</span><span>${r.tmdb_rating.toFixed(1)}</span></div>` : 'N/A'}
                    </td>
                    <td>
                        <span class="badge ${getModeClass(r.mode)}">${r.mode}</span>
                    </td>
                    <td>
                        <span class="badge ${getStatusClass(r.status)}">${r.status}</span>
                    </td>
                </tr>
            `).join('');

            // Pagination
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = `
                <span style="color: var(--text-secondary)">
                    ${data.total} total | Page ${data.page} of ${data.pages}
                </span>
                <div class="flex gap-2">
                    ${data.page > 1
                        ? `<button onclick="loadCompleted(${data.page - 1})"
                            class="btn-sm btn-outline">← Prev</button>`
                        : ''}
                    ${data.page < data.pages
                        ? `<button onclick="loadCompleted(${data.page + 1})"
                            class="btn-sm btn-outline">Next →</button>`
                        : ''}
                </div>
            `;

        } catch (e) {
            showToast('Failed to load completed jobs', 'error');
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function getModeClass(mode) {
        switch(mode) {
            case 'auto': return 'badge-auto';
            case 'manual': return 'badge-manual';
            case 'quality_match': return 'badge-quality_match';
            case 'dry_run': return 'badge-dry_run';
            case 'rejected': return 'badge-skipped';
            default: return 'badge-dry_run';
        }
    }

    function getStatusClass(status) {
        switch(status) {
            case 'completed': return 'badge-completed';
            case 'queued': return 'badge-queued';
            case 'rejected': return 'badge-skipped';
            case 'failed': return 'badge-skipped';
            default: return 'badge-dry_run';
        }
    }

    async function updateMissingDetails() {
        if (!confirm('This will try to fill in missing Indexer, Peers, TMDB Rating, and Year from pending replacement data. Continue?')) return;
        
        try {
            const res = await fetch('/api/completed/update-missing-details', { method: 'POST' });
            const data = await res.json();
            if (res.ok) {
                showToast(data.message, 'success');
                loadCompleted(currentPage);
            } else {
                showToast(data.detail || 'Failed to update details', 'error');
            }
        } catch (e) {
            showToast('Error: ' + e.message, 'error');
        }
    }
    
    async function clearCompletedJobs() {
        if (!confirm('Are you sure you want to clear ALL completed job history? This cannot be undone.')) return;
        
        try {
            const res = await fetch('/api/completed/clear', { method: 'DELETE' });
            if (res.ok) {
                showToast('Cleared job history', 'success');
                loadCompleted(1);
            } else {
                showToast('Failed to clear history', 'error');
            }
        } catch (e) {
            showToast('Error: ' + e.message, 'error');
        }
    }
</script>
{% endblock %}
