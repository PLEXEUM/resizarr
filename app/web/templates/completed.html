{% extends "base.html" %}

{% block content %}
<div class="space-y-6">

    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold">Completed Jobs</h1>
            <p class="text-sm mt-1" style="color: var(--text-secondary)">
                History of movies that were replaced, queued, or rejected.
            </p>
        </div>
        <button onclick="clearCompletedJobs()"
            class="text-xs px-2 py-1 rounded border border-red-500 text-red-500 hover:bg-red-50 transition-colors">
            Clear History
        </button>
    </div>

    <!-- Completed Jobs Table -->
    <div class="card rounded-xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead style="background: var(--bg-primary)">
                    <tr style="color: var(--text-secondary)">
                        <th class="text-left px-4 py-3 font-medium">Date</th>
                        <th class="text-left px-4 py-3 font-medium">Movie</th>
                        <th class="text-left px-4 py-3 font-medium">From → To</th>
                        <th class="text-left px-4 py-3 font-medium">Indexer</th>
                        <th class="text-left px-4 py-3 font-medium">Peers</th>
                        <th class="text-left px-4 py-3 font-medium">TMDB</th>
                        <th class="text-left px-4 py-3 font-medium">Mode</th>
                        <th class="text-left px-4 py-3 font-medium">Status</th>
                    </tr>
                </thead>
                <tbody id="completed-table">
                    <tr>
                        <td colspan="8" class="px-4 py-8 text-center"
                            style="color: var(--text-secondary)">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="flex items-center justify-between text-sm"></div>

</div>
{% endblock %}

{% block scripts %}
<script>
    let currentPage = 1;

    window.addEventListener('DOMContentLoaded', () => {
        loadCompleted(1);
    });

    async function loadCompleted(page) {
        currentPage = page;
        try {
            const res = await fetch(`/api/completed?page=${page}&per_page=20`);
            const data = await res.json();
            const tbody = document.getElementById('completed-table');

            if (!data.records || data.records.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" class="px-4 py-8 text-center"
                            style="color: var(--text-secondary)">
                            No completed jobs yet.
                        </td>
                    </tr>`;
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            tbody.innerHTML = data.records.map(r => `
                <tr style="border-top: 1px solid var(--border-color)">
                    <td class="px-4 py-3 whitespace-nowrap">${new Date(r.completed_at).toLocaleDateString()}</td>
                    <td class="px-4 py-3">
                        <div class="font-medium">${escapeHtml(r.movie_title)}</div>
                        <div class="text-xs" style="color: var(--text-secondary)">${r.movie_year || 'Year N/A'}</div>
                    </td>
                    <td class="px-4 py-3">
                        <div class="text-red-400">${r.current_size_gb?.toFixed(2) || 'N/A'} GB (${r.current_quality || 'N/A'})</div>
                        <div class="text-green-400">→ ${r.found_size_gb?.toFixed(2) || 'N/A'} GB (${r.found_quality || 'N/A'})</div>
                        <div class="text-xs" style="color: var(--text-secondary)">
                            ${((r.current_size_gb - r.found_size_gb) || 0).toFixed(2)} GB saved
                        </div>
                    </td>
                    <td class="px-4 py-3">
                        <div class="text-xs">${r.indexer || 'N/A'}</div>
                    </td>
                    <td class="px-4 py-3">
                        <div class="flex items-center gap-1">
                            <span style="color: #10b981;">▼</span>
                            <span>${r.seeders || 0}</span>
                        </div>
                    </td>
                    <td class="px-4 py-3">
                        ${r.tmdb_rating ? `<div class="flex items-center gap-1"><span style="color: #f5c518;">★</span><span>${r.tmdb_rating.toFixed(1)}</span></div>` : 'N/A'}
                    </td>
                    <td class="px-4 py-3">
                        <span class="text-xs px-2 py-1 rounded ${getModeClass(r.mode)}">${r.mode}</span>
                    </td>
                    <td class="px-4 py-3">
                        <span class="text-xs px-2 py-1 rounded ${getStatusClass(r.status)}">${r.status}</span>
                    </td>
                </tr>
            `).join('');

            // Pagination
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = `
                <span style="color: var(--text-secondary)">
                    ${data.total} total | Page ${data.page} of ${data.pages}
                </span>
                <div class="flex gap-2">
                    ${data.page > 1
                        ? `<button onclick="loadCompleted(${data.page - 1})"
                            class="px-3 py-1 rounded text-xs border"
                            style="border-color: var(--border-color);">← Prev</button>`
                        : ''}
                    ${data.page < data.pages
                        ? `<button onclick="loadCompleted(${data.page + 1})"
                            class="px-3 py-1 rounded text-xs border"
                            style="border-color: var(--border-color);">Next →</button>`
                        : ''}
                </div>
            `;

        } catch (e) {
            showToast('Failed to load completed jobs', 'error');
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function getModeClass(mode) {
        switch(mode) {
            case 'auto': return 'bg-green-800 text-green-200';
            case 'manual': return 'bg-blue-800 text-blue-200';
            case 'quality_match': return 'bg-purple-800 text-purple-200';
            case 'dry_run': return 'bg-gray-800 text-gray-200';
            case 'rejected': return 'bg-red-800 text-red-200';
            default: return 'bg-gray-800 text-gray-200';
        }
    }

    function getStatusClass(status) {
        switch(status) {
            case 'completed': return 'bg-green-800 text-green-200';
            case 'queued': return 'bg-yellow-800 text-yellow-200';
            case 'rejected': return 'bg-red-800 text-red-200';
            case 'failed': return 'bg-red-800 text-red-200';
            default: return 'bg-gray-800 text-gray-200';
        }
    }

    async function clearCompletedJobs() {
        if (!confirm('Are you sure you want to clear ALL completed job history? This cannot be undone.')) return;
        
        try {
            const res = await fetch('/api/completed/clear', { method: 'DELETE' });
            if (res.ok) {
                showToast('Cleared job history', 'success');
                loadCompleted(1);
            } else {
                showToast('Failed to clear history', 'error');
            }
        } catch (e) {
            showToast('Error: ' + e.message, 'error');
        }
    }
</script>
{% endblock %}
