{% extends "base.html" %}

{% block content %}
<div class="space-y-6">

    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold">Pending Approvals</h1>
            <p class="text-sm mt-1" style="color: var(--text-secondary)">
                Review and approve replacement candidates.
            </p>
        </div>
        <div class="flex items-center gap-2 text-xs" style="color: var(--text-secondary)">
            <span>Auto-refreshes every 30s</span>
            <span id="refresh-indicator" class="spinner"></span>
        </div>
    </div>

    <!-- Batch Actions -->
    <div class="card rounded-xl p-4 flex items-center gap-4">
        <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" id="select-all" class="accent-indigo-500"
                onchange="toggleSelectAll()" />
            <span class="text-sm">Select All (this page)</span>
        </label>
        <button onclick="confirmBatchApprove()"
            id="batch-approve-btn"
            class="px-4 py-2 rounded-lg text-sm font-medium text-white disabled:opacity-50"
            style="background: var(--accent);" disabled>
            Approve Selected (<span id="selected-count">0</span>)
        </button>
        <span class="text-xs" style="color: var(--text-secondary)">Max 50 per batch</span>
    </div>

    <!-- Pending Table -->
    <div class="card rounded-xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead style="background: var(--bg-primary)">
                    <tr style="color: var(--text-secondary)">
                        <th class="text-left px-4 py-3 font-medium w-8"></th>
                        <th class="text-left px-4 py-3 font-medium">Movie</th>
                        <th class="text-left px-4 py-3 font-medium">Current</th>
                        <th class="text-left px-4 py-3 font-medium">Found</th>
                        <th class="text-left px-4 py-3 font-medium">Age</th>
                        <th class="text-left px-4 py-3 font-medium">Override</th>
                        <th class="text-left px-4 py-3 font-medium">Actions</th>
                    </tr>
                </thead>
                <tbody id="pending-table">
                    <tr>
                        <td colspan="7" class="px-4 py-8 text-center"
                            style="color: var(--text-secondary)">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="flex items-center justify-between text-sm"></div>

</div>

<!-- Batch Approve Dialog -->
<div id="batch-dialog" class="hidden fixed inset-0 flex items-center justify-center z-50"
    style="background: rgba(0,0,0,0.6)">
    <div class="card rounded-xl p-6 max-w-sm w-full mx-4">
        <h3 class="font-semibold mb-2">Confirm Batch Approve</h3>
        <p id="batch-dialog-text" class="text-sm mb-6"
            style="color: var(--text-secondary)"></p>
        <label class="flex items-center gap-2 mb-6 cursor-pointer">
            <input type="checkbox" id="batch-override" class="accent-indigo-500" />
            <span class="text-sm">Override quality downgrades</span>
        </label>
        <div class="flex gap-3">
            <button onclick="executeBatchApprove()"
                class="flex-1 py-2 rounded-lg text-sm font-medium text-white"
                style="background: var(--accent);">Approve</button>
            <button onclick="closeBatchDialog()"
                class="flex-1 py-2 rounded-lg text-sm border"
                style="border-color: var(--border-color);">Cancel</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let currentPage = 1;
    let refreshTimer = null;

    window.addEventListener('DOMContentLoaded', () => {
        loadPending(1);
        scheduleRefresh();
    });

    function scheduleRefresh() {
        refreshTimer = setTimeout(() => {
            loadPending(currentPage);
            scheduleRefresh();
        }, 30000);
    }

    function getAge(createdAt) {
        if (!createdAt) return 'N/A';
        const diff = Date.now() - new Date(createdAt).getTime();
        const hours = Math.floor(diff / 3600000);
        const mins = Math.floor((diff % 3600000) / 60000);
        if (hours > 0) return `${hours}h ${mins}m`;
        return `${mins}m`;
    }

    async function loadPending(page) {
        currentPage = page;
        try {
            const res = await fetch(`/api/pending?page=${page}&per_page=20`);
            const data = await res.json();
            const tbody = document.getElementById('pending-table');

            if (!data.records || data.records.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="px-4 py-8 text-center"
                            style="color: var(--text-secondary)">
                            No pending approvals.
                        </td>
                    </tr>`;
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            tbody.innerHTML = data.records.map(r => `
                <tr style="border-top: 1px solid var(--border-color)"
                    class="${r.quality_downgrade ? 'bg-yellow-900 bg-opacity-10' : ''}">
                    <td class="px-4 py-3">
                        <input type="checkbox" class="accent-indigo-500 row-checkbox"
                            data-id="${r.id}" onchange="updateSelectedCount()" />
                    </td>
                    <td class="px-4 py-3">
                        <div class="font-medium">${r.movie_title}</div>
                        ${r.quality_downgrade
                            ? '<span class="text-xs px-2 py-0.5 rounded bg-yellow-800 text-yellow-200">⚠ Quality Downgrade</span>'
                            : ''}
                    </td>
                    <td class="px-4 py-3">
                        <div>${r.current_size_gb ? r.current_size_gb.toFixed(2) + ' GB' : 'N/A'}</div>
                        <div class="text-xs" style="color: var(--text-secondary)">${r.current_quality || 'N/A'}</div>
                    </td>
                    <td class="px-4 py-3">
                        <div>${r.found_size_gb ? r.found_size_gb.toFixed(2) + ' GB' : 'N/A'}</div>
                        <div class="text-xs" style="color: var(--text-secondary)">${r.found_quality || 'N/A'}</div>
                    </td>
                    <td class="px-4 py-3 text-xs" style="color: var(--text-secondary)">
                        ${getAge(r.created_at)}
                    </td>
                    <td class="px-4 py-3">
                        ${r.quality_downgrade
                            ? `<input type="checkbox" class="accent-indigo-500 override-checkbox"
                                data-id="${r.id}" />`
                            : '—'}
                    </td>
                    <td class="px-4 py-3">
                        <div class="flex gap-2">
                            <button onclick="approveSingle(${r.id})"
                                class="px-3 py-1 rounded text-xs font-medium text-white"
                                style="background: var(--accent);">Approve</button>
                            <button onclick="deleteRecord(${r.id})"
                                class="px-3 py-1 rounded text-xs border"
                                style="border-color: #ef4444; color: #ef4444;">Reject</button>
                        </div>
                    </td>
                </tr>
            `).join('');

            // Pagination
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = `
                <span style="color: var(--text-secondary)">
                    ${data.total} total | Page ${data.page} of ${data.pages}
                </span>
                <div class="flex gap-2">
                    ${data.page > 1
                        ? `<button onclick="loadPending(${data.page - 1})"
                            class="px-3 py-1 rounded text-xs border"
                            style="border-color: var(--border-color);">← Prev</button>`
                        : ''}
                    ${data.page < data.pages
                        ? `<button onclick="loadPending(${data.page + 1})"
                            class="px-3 py-1 rounded text-xs border"
                            style="border-color: var(--border-color);">Next →</button>`
                        : ''}
                </div>
            `;

        } catch (e) {
            showToast('Failed to load pending approvals', 'error');
        }
    }

    function toggleSelectAll() {
        const checked = document.getElementById('select-all').checked;
        document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = checked);
        updateSelectedCount();
    }

    function updateSelectedCount() {
        const count = document.querySelectorAll('.row-checkbox:checked').length;
        document.getElementById('selected-count').textContent = count;
        document.getElementById('batch-approve-btn').disabled = count === 0;
    }

    async function approveSingle(id) {
        const overrideEl = document.querySelector(`.override-checkbox[data-id="${id}"]`);
        const override = overrideEl ? overrideEl.checked : false;

        try {
            const res = await fetch(`/api/pending/${id}/approve`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ override_quality: override })
            });

            if (res.ok) {
                showToast('Approved!', 'success');
                loadPending(currentPage);
            } else {
                const data = await res.json();
                showToast(data.detail || 'Failed to approve', 'error');
            }
        } catch (e) {
            showToast('Request failed: ' + e.message, 'error');
        }
    }

    async function deleteRecord(id) {
        try {
            const res = await fetch(`/api/pending/${id}`, { method: 'DELETE' });
            if (res.ok) {
                showToast('Rejected', 'info');
                loadPending(currentPage);
            } else {
                showToast('Failed to delete', 'error');
            }
        } catch (e) {
            showToast('Request failed: ' + e.message, 'error');
        }
    }

    function confirmBatchApprove() {
        const count = document.querySelectorAll('.row-checkbox:checked').length;
        document.getElementById('batch-dialog-text').textContent =
            `You are about to approve ${count} replacement(s). This will trigger searches in Radarr.`;
        document.getElementById('batch-dialog').classList.remove('hidden');
    }

    function closeBatchDialog() {
        document.getElementById('batch-dialog').classList.add('hidden');
    }

    async function executeBatchApprove() {
        closeBatchDialog();
        const ids = [...document.querySelectorAll('.row-checkbox:checked')]
            .map(cb => parseInt(cb.dataset.id));
        const override = document.getElementById('batch-override').checked;

        try {
            const res = await fetch('/api/pending/approve-batch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ids, override_quality: override })
            });

            if (res.ok) {
                const data = await res.json();
                showToast(
                    `Approved ${data.approved}, failed ${data.failed}`,
                    data.failed > 0 ? 'warning' : 'success'
                );
                sendNotification('Resizarr', `Batch approved ${data.approved} replacements`);
                loadPending(currentPage);
            } else {
                const data = await res.json();
                showToast(data.detail || 'Batch approve failed', 'error');
            }
        } catch (e) {
            showToast('Request failed: ' + e.message, 'error');
        }
    }
</script>
{% endblock %}
